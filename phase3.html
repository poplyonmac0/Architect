<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>المرحلة 3</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #000;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: monospace;
            color: #00e5ff;
            flex-direction: column;
            gap: 8px;
        }
        @keyframes p { 0%,100%{opacity:0.3} 50%{opacity:1} }
        .msg { font-size: 12px; letter-spacing: 2px; animation: p 1.2s infinite; }
    </style>
</head>
<body>
<div class="msg">PHASE 3 — LOADING...</div>
<script>

// ================================================================
// phase3.html — المرحلة الثالثة
// العنوان: "الصوت الآخر"
// ================================================================
// القصة:
// اللاعب بيكتشف إن في جهاز تاني في الشبكة
// بيحاول يتواصل معاه.
// Architect بيقول إن ده جهاز شخص تاني محتاج مساعدة.
// Hectari بيقول إن ده فخ — وإن Architect هو اللي نصبه.
// اللاعب لازم يقرر يتواصل مع الجهاز ده ولا لا.
// أول مرة اللاعب بيحس إن في حاجة مش كاملة
// في قصة Architect.
// ================================================================

var isFirstTime = localStorage.getItem('phase3_initialized') !== '1';

localStorage.setItem('currentPhase', 'phase3');
localStorage.setItem('gameProgress',  'phase3');

if (isFirstTime) {
    localStorage.setItem('phase3_initialized', '1');

    localStorage.removeItem('chatHistory');
    localStorage.removeItem('chatStep');
    localStorage.removeItem('chatStepShown');
    localStorage.removeItem('termHistory');
    localStorage.removeItem('clipboard');

    localStorage.setItem('badge_chat',     '1');
    localStorage.setItem('badge_terminal', '0');

    var initNotes = [{
        id:      Date.now(),
        phaseId: 'phase3_welcome',
        title:   'Architect',
        content: 'في المرحلة دي هتسمع صوت تاني.\n' +
                 'متصدقش كل حاجة بتسمعها.\n' +
                 'أنا الوحيد اللي بيحميك.',
        code:    '',
        tag:     'note',
        date:    new Date().toISOString()
    }];
    localStorage.setItem('gameNotes', JSON.stringify(initNotes));

    // ================================================================
    // رسائل A.ai
    // ================================================================
    var chatSteps = [

        {
            id: 'start',
            messages: [
                {
                    type:   'ai',
                    sender: 'Architect',
                    text:   'في حاجة جديدة.\n' +
                            'لقيت إشارة ضعيفة جاية من جهاز تاني.',
                    delay:  1000
                },
                {
                    type:   'ai',
                    sender: 'Architect',
                    text:   'الإشارة دي شبه رسالة —\n' +
                            '"هل فيه حد بيسمعني؟"\n' +
                            'في حد تاني زيك محتاج مساعدة.',
                    delay:  1600
                },
                {
                    type:   'ai',
                    sender: 'Architect',
                    text:   'روح Terminal —\n' +
                            'وحاول تتواصل مع الجهاز ده.\n' +
                            'بس خد بالك — Hectari شايف كل حاجة.',
                    delay:  1400
                }
            ],
            action: {
                type:   'button',
                label:  '💻 افتح Terminal',
                target: 'terminal.html'
            }
        },

        {
            id: 'after_ping',
            messages: [
                {
                    type:   'ai',
                    sender: 'Architect',
                    text:   'اتصلت بالجهاز التاني.\n' +
                            'الشخص ده محتاج مساعدة فعلاً.',
                    delay:  1000
                },
                {
                    type:   'ai',
                    sender: 'Architect',
                    text:   'بس Hectari قطع الاتصال بسرعة.\n' +
                            'لازم تفتح قناة آمنة عشان تكمل الكلام.',
                    delay:  1200
                },
                {
                    type:   'ai',
                    sender: 'Architect',
                    text:   'حل اللغز ده —\n' +
                            'والنتيجة هتفتحلك القناة الآمنة.',
                    delay:  1200
                }
            ],
            action: {
                type:   'button',
                label:  '🧩 ابدأ اللغز',
                target: 'puzzle1.html'
            }
        },

        {
            id: 'after_puzzle',
            messages: [
                {
                    type:   'ai',
                    sender: 'Architect',
                    text:   'القناة الآمنة جاهزة.\n' +
                            'الكود في المفكرة —\n' +
                            'الصقه في Terminal.',
                    delay:  1000
                }
            ],
            action: {
                type: 'choices',
                choices: [
                    {
                        label:  '📒 روح المفكرة',
                        value:  'notes',
                        action: 'open',
                        target: 'notes.html'
                    },
                    {
                        label:  '💻 روح Terminal',
                        value:  'term',
                        action: 'open',
                        target: 'terminal.html'
                    }
                ]
            }
        },

        {
            id: 'after_secure',
            messages: [
                {
                    type:   'ai',
                    sender: 'Architect',
                    text:   'تواصلت مع الجهاز التاني.\n' +
                            'الشخص ده قالك إن Hectari هو اللي اخترقه هو كمان.',
                    delay:  1200
                },
                {
                    type:   'ai',
                    sender: 'Architect',
                    text:   'بس في جملة واحدة قالها قبل ما الاتصال ينقطع:\n' +
                            '"اسأل Architect عن origin.dat."\n' +
                            'مش عارف قصده إيه.',
                    delay:  1600
                },
                {
                    type:  'system',
                    text:  '⚠️ تلميح: إيه علاقة Architect بـ origin.dat؟',
                    delay: 800
                }
            ],
            action: {
                type:   'button',
                label:  '▶ المرحلة التالية',
                target: 'phase4.html'
            }
        }
    ];

    localStorage.setItem('chatSteps', JSON.stringify(chatSteps));

    // ================================================================
    // أوامر Terminal
    // ================================================================
    var termCmds = [

        {
            cmd:  '__hectari_intro__',
            text: 'أنا شايف إن Architect بعتك هنا.\n' +
                  'هو بيقولك إن في جهاز تاني محتاج مساعدة؟\n' +
                  'ده كلام فاضي — ده فخ.\n' +
                  'Architect هو اللي نصب الفخ ده من البداية.\n' +
                  'بس لو عايز تجرب — اكتب: ping device2\n' +
                  'وشوف بنفسك.'
        },

        {
            cmd: 'ping device2',
            response: [
                { text: 'Pinging device 2...',             cls: 'dim',    delay: 300 },
                { text: 'Response received.',              cls: 'success',delay: 400 },
                { text: 'Signal: WEAK',                    cls: 'warn',   delay: 200 },
                { text: 'Message: "هل فيه حد بيسمعني؟"', cls: 'output', delay: 300 },
                { text: 'Connection dropped.',             cls: 'error',  delay: 200 }
            ],
            trigger: {
                type: 'multi',
                actions: [
                    { type: 'hectari_typing' },
                    { type: 'set_chat_step', step: 'after_ping' }
                ]
            }
        },

        {
            cmd: 'secure_connect',
            response: [
                { text: 'Establishing secure channel...',  cls: 'dim',    delay: 300 },
                { text: 'Encryption: ACTIVE',              cls: 'success',delay: 400 },
                { text: 'Connected to device 2.',          cls: 'success',delay: 200 },
                { text: '',                                cls: 'dim'               },
                { text: 'Device 2: "شكراً. أنا هنا."',    cls: 'output', delay: 300 },
                { text: 'Device 2: "اسأل Architect عن origin.dat."', cls: 'warn', delay: 400 },
                { text: 'Connection closed by Hectari.',   cls: 'error',  delay: 300 }
            ],
            trigger: {
                type: 'multi',
                actions: [
                    { type: 'hectari_typing' },
                    { type: 'set_chat_step', step: 'after_secure' }
                ]
            }
        },

        {
            cmd: 'help',
            response: [
                { text: 'COMMANDS:',                                  cls: 'system' },
                { text: '  ping device2    — ping second device',      cls: 'output', delay: 60 },
                { text: '  secure_connect  — open secure channel',     cls: 'output', delay: 60 },
                { text: '  clear           — clear screen',            cls: 'output', delay: 60 }
            ]
        }
    ];

    localStorage.setItem('terminalCommands', JSON.stringify(termCmds));

    // ================================================================
    // اللغز — Simon Says
    // ================================================================
    var puzzleCfg = {
        type:           'simon',
        title:          'اختبار المرحلة 3',
        desc:           'Architect بيقولك:<br>' +
                        '<em>"القناة الآمنة بتشتغل على تسلسل معين.<br>' +
                        'احفظ التسلسل وكرره بالظبط."</em>',
        simonLength:    5,
        simonSymbols:   ['1','2','3','4','5','6'],
        timeLimit:      0,
        winMsg:         'ممتاز! كود القناة الآمنة في المفكرة.',
        winTarget:      'chat.html',
        backTarget:     'launcher.html',
        winNoteTitle:   'Architect',
        winNoteContent: 'كود القناة الآمنة جاهز.\nالصقه في Terminal.',
        winNoteCode:    'secure_connect',
        winNoteTag:     'cmd',
        winNotePhaseId: 'phase3_puzzle_win'
    };

    localStorage.setItem('puzzleConfig', JSON.stringify(puzzleCfg));
}

window.onPhaseComplete = function(nextFile) {
    localStorage.removeItem('phase3_initialized');
    localStorage.removeItem('chatHistory');
    localStorage.removeItem('chatStep');
    localStorage.removeItem('chatStepShown');
    localStorage.removeItem('termHistory');
    localStorage.removeItem('terminalCommands');
    localStorage.removeItem('chatSteps');
    localStorage.removeItem('puzzleConfig');
    localStorage.removeItem('clipboard');
    localStorage.removeItem('gameNotes');

    var next = nextFile || 'phase4.html';
    var num  = next.replace('phase','').replace('.html','');
    localStorage.setItem('currentPhase', 'phase' + num);
    localStorage.setItem('gameProgress',  'phase' + num);

    window.location.href = next;
};

setTimeout(function() {
    window.location.href = 'launcher.html';
}, 500);

</script>
</body>
</html>
